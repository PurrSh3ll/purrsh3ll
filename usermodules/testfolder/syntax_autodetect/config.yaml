server:
  host: 0.0.0.0
  port: 8080
  debug: false
  workers: 4

database:
  host: localhost
  port: 5432
  name: mydb
  user: admin
  password: secret
  pool_size: 10

logging:
  level: INFO
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  handlers:
    - type: file
      path: /var/log/app.log
    - type: console

features:
  rate_limiting: true
  cache_ttl: 300
  allowed_origins:
    - https://example.com
    - https://api.example.com
