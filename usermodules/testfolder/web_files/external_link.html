<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strona z linkami zewnętrznymi</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 50px; }
        a {
            display: inline-block;
            margin: 10px;
            padding: 10px 20px;
            border: 2px solid blue;
            text-decoration: none;
            color: blue;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <h1>Przykładyq Linków Zewnętrznych</h1>

    <p>
        Kliknij, aby przejść do strony głównej Google:
        <a href="https://www.google.com">Przejdź do Google</a>
    </p>

    <p>
        Kliknij, aby otworzyć Wikipedię w nowej karcie:
        <a href="https://pl.wikipedia.org/wiki/Strona_g%C5%82%C3%B3wna" target="_blank">Otwórz Wikipedię (Nowa Karta)</a>
    </p>

</body>
</html>
