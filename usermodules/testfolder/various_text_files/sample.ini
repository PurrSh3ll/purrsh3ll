[General]
; Główna sekcja z podstawowymi ustawieniami klienta
ClientVersion = 2.5.1
LastLoggedInUser = PlayerOne
Language = pl_PL
EnableTutorialHints = true

[Graphics]
; Ustawienia dotyczące wyświetlania i grafiki
Resolution = 1920x1080
FullScreen = 1
VsyncEnabled = 1
TextureQuality = High
ShadowDetail = Medium
MaxFPS = 60

[Audio]
; Ustawienia dźwięku
MasterVolume = 0.85
MusicVolume = 0.60
SFXVolume = 1.0
Enable3DSound = false

[Network]
; Ustawienia połączenia sieciowego
ServerAddress = game-prod.example.com
ServerPort = 7777
ConnectionTimeout = 10
AutoReconnect = yes

[KeyBindings]
; Mapowanie klawiszy (Przykładowe ustawienia)
MoveForward = W
MoveBackward = S
MoveLeft = A
MoveRight = D
Jump = Space
Interact = E
OpenInventory = I
