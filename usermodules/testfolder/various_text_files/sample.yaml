# Plik Konfiguracyjny Wdrozenia: deployment.yaml
# Data: 2025-10-22
# Opis: Konfiguracja serwisu i konteneryzacji
# ==============================================================================

# Definicja głównej usługi (Service Definition)
service:
  name: api-gateway-prod
  version: 1.5.0
  environment: Production
  replicas: 3

# Ustawienia sieciowe
network:
  port: 80
  protocol: TCP
  dns_settings:
    primary_server: 10.0.0.1
    secondary_server: 10.0.0.2

# Konfiguracja kontenera (lista obiektów)
containers:
  - name: frontend-web
    image: registry.example.com/frontend:latest
    cpu_limit: 500m
    memory_limit: 1024Mi
    ports: [80, 443]

  - name: backend-api
    image: registry.example.com/backend:v1.5
    cpu_limit: 1000m
    memory_limit: 2048Mi
    ports: [8080]
    
    # Zagnieżdżony słownik ustawień środowiskowych
    env_vars:
      DB_HOST: prod-db-instance
      DB_PORT: 5432
      LOG_LEVEL: WARN

# Lista użytkowników z różnymi poziomami uprawnień (Tablica Haszy/Słowników)
users:
  - username: admin_user
    role: administrator
    access_level: 99
  - username: deploy_bot
    role: automation
    access_level: 50
  - username: view_only
    role: guest
    access_level: 10
