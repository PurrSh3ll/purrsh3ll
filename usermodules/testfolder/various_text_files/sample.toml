# ==============================================================================
# Plik Konfiguracyjny Projektu: project.toml
# Data: 2025-10-22
# Opis: Konfiguracja narzedzi, zaleznosci i srodowiska
# ==============================================================================

# Sekcja glowna z metadanymi projektu
name = "SystemMonitor"
version = "1.2.0"
authors = ["AI Assistant <ai@example.com>", "Developer <dev@example.com>"]
license = "MIT"
repository = "https://github.com/example/systemmonitor"

# Tablica (Array) prostych wartosci
tags = ["system", "monitoring", "cli", "python"]

# Tablica tabel (Array of Tables) - lista serwerow
[[servers]]
host = "data-prod-01"
port = 8080
role = "production"
timeout = 300
enabled = true

[[servers]]
host = "data-test-02"
port = 8080
role = "staging"
timeout = 60
enabled = false

# Tabele zagnieżdżone (Nested Tables)
[build.options]
compiler = "gcc"
flags = ["-Wall", "-Wextra", "-O2"]
optimization_level = 2

[build.artifacts]
output_dir = "dist/"
main_binary = "monitor_app"
clean_on_exit = true

# Tabele (sekcje) dla zaleznosci
[dependencies]
logging_lib = { version = ">=0.9.0", required = true }
network_tool = { version = "==3.1.5", required = false, optional = ["ssl"] }

[development-dependencies]
pytest = { version = "7.0" }
mock = { version = "1.2" }
